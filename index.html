<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Lab Finder — BRACU CSE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c0e;
    --surface: #0e1518;
    --border: #1e2d32;
    --green: #00ff88;
    --green-dim: #00c86a;
    --green-faint: rgba(0,255,136,0.06);
    --red: #ff3b5c;
    --yellow: #ffd600;
    --text: #c8dde4;
    --muted: #4a6570;
    --card: #111a1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
    position: relative;
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
  }

  h1 span {
    color: var(--green);
    text-shadow: 0 0 30px rgba(0,255,136,0.5);
  }

  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    letter-spacing: 1px;
  }

  .pulse-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  @media (max-width: 600px) {
    .controls { grid-template-columns: 1fr; }
  }

  .control-group label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
    padding: 9px 18px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green-faint);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover {
    border-color: var(--green-dim);
    color: var(--green);
  }

  .btn:hover::before { opacity: 1; }

  .btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 12px rgba(0,255,136,0.2), inset 0 0 12px rgba(0,255,136,0.05);
  }

  .time-btn {
    flex: 1;
    text-align: center;
    min-width: 120px;
  }

  .time-label {
    display: block;
    font-size: 16px;
    font-weight: 700;
  }

  .time-sub {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* SEARCH ACTION */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .search-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 36px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .search-btn:hover {
    background: #fff;
    box-shadow: 0 0 24px rgba(0,255,136,0.4);
  }

  .search-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* RESULTS */
  .results-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .results-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .results-count {
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
    font-family: 'Share Tech Mono', monospace;
  }

  .floor-section {
    margin-bottom: 36px;
  }

  .floor-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .floor-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,214,0,0.3), transparent);
  }

  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .room-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .room-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), transparent);
  }

  .room-card:hover {
    border-color: var(--green-dim);
    background: rgba(0,255,136,0.05);
    transform: translateY(-2px);
    transition: all 0.2s ease;
  }

  .room-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .room-floor {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .room-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .room-status-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--border);
    letter-spacing: 1px;
  }

  /* INITIAL STATE */
  .initial-state {
    text-align: center;
    padding: 80px 20px;
  }

  .initial-icon {
    font-size: 56px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .initial-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .initial-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--border);
    letter-spacing: 1px;
  }

  /* Summary strip */
  .summary-strip {
    background: rgba(0,255,136,0.06);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 6px;
    padding: 14px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .summary-strip .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 3px;
  }

  .tag-day {
    background: rgba(255,214,0,0.15);
    color: var(--yellow);
    border: 1px solid rgba(255,214,0,0.3);
  }

  .tag-time {
    background: rgba(0,255,136,0.1);
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
  }

  .tag-count {
    background: rgba(255,255,255,0.05);
    color: #fff;
    border: 1px solid var(--border);
  }
</style>
</head>

</div>

// All known lab rooms
const ALL_ROOMS = ['09B-08L','09B-09L','09B-10L','09B-11L','09E-21L','09E-22L','09F-24L','09F-25L','09F-26L','09F-27L','10E-27L','10G-32L','10G-33L','10G-34L','11B-20L','12B-20L','12D-26L','12D-27L','12F-30L','12F-31L','12F-32L','FT10-01L','FT10-02L','FT10-03L','FT10-04L','FT11-01L','FT11-03L','FT11-04L'];

// Parse floor info from room name
function parseRoom(room) {
  // e.g. 09B-08L → floor 9, zone B, no 08
  // FT11-04L → floor FT11
  const m = room.match(/^(\d+)([A-Z]+)-(\d+)L$/);
  if (m) return { floor: parseInt(m[1]), zone: m[2], no: m[3], display: `Floor ${parseInt(m[1])} · Zone ${m[2]}` };
  const ft = room.match(/^(FT\d+)-(\d+)L$/);
  if (ft) return { floor: ft[1], zone: '', no: ft[2], display: ft[1] };
  return { floor: '?', zone: '', no: '', display: '?' };
}

// Group rooms by floor
function groupByFloor(rooms) {
  const groups = {};
  rooms.forEach(r => {
    const p = parseRoom(r);
    const key = p.display;
    if (!groups[key]) groups[key] = { label: key, rooms: [], floorNum: typeof p.floor === 'number' ? p.floor : 999 };
    groups[key].rooms.push(r);
  });
  return Object.values(groups).sort((a,b) => a.floorNum - b.floorNum);
}

let selectedDay = null;
let selectedTime = null;

// ─── UI LOGIC ────────────────────────────────────────────────────────────────
document.querySelectorAll('#dayBtns .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#dayBtns .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDay = btn.dataset.day;
    updateStatus();
  });
});

document.querySelectorAll('#timeBtns .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#timeBtns .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTime = btn.dataset.time;
    updateStatus();
  });
});

function updateStatus() {
  const sb = document.getElementById('searchBtn');
  const st = document.getElementById('statusText');
  if (selectedDay && selectedTime) {
    sb.disabled = false;
    const timeLabel = selectedTime === '8:00 AM' ? '8:00–11:00 AM' : selectedTime === '11:00 AM' ? '11:00 AM–2:00 PM' : '2:00–5:00 PM';
    st.textContent = `READY — ${selectedDay} · ${timeLabel}`;
    st.style.color = 'var(--green)';
  } else if (selectedDay) {
    st.textContent = 'NOW SELECT A TIME SLOT';
    st.style.color = 'var(--muted)';
  } else if (selectedTime) {
    st.textContent = 'NOW SELECT A DAY';
    st.style.color = 'var(--muted)';
  } else {
    st.textContent = 'SELECT DAY AND TIME SLOT ABOVE';
    st.style.color = 'var(--muted)';
  }
}

document.getElementById('searchBtn').addEventListener('click', () => {
  if (!selectedDay || !selectedTime) return;

  // Find busy rooms
  const busy = new Set(
    schedule
      .filter(s => s.day === selectedDay && s.time === selectedTime)
      .map(s => s.room)
  );

  const freeRooms = ALL_ROOMS.filter(r => !busy.has(r));
  const floorGroups = groupByFloor(freeRooms);

  const timeLabel = selectedTime === '8:00 AM' ? '8:00 – 11:00 AM' : selectedTime === '11:00 AM' ? '11:00 AM – 2:00 PM' : '2:00 – 5:00 PM';
  const output = document.getElementById('output');

  if (freeRooms.length === 0) {
    output.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <div class="empty-title">No free labs found</div>
        <div class="empty-sub">// ALL LABS ARE OCCUPIED ON ${selectedDay} · ${timeLabel}</div>
      </div>`;
    return;
  }

  let html = `
    <div class="summary-strip">
      <span class="tag tag-day">${selectedDay}</span>
      <span class="tag tag-time">${timeLabel}</span>
      <span class="tag tag-count">${freeRooms.length} FREE / ${ALL_ROOMS.length} TOTAL</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto">${busy.size} ROOMS OCCUPIED</span>
    </div>
    <div class="results-header">
      <span class="results-title">FREE LABS AVAILABLE</span>
      <span class="results-count">${freeRooms.length}</span>
    </div>`;

  floorGroups.forEach((group, gi) => {
    html += `<div class="floor-section">
      <div class="floor-header">${group.label}</div>
      <div class="room-grid">`;
    group.rooms.forEach((room, ri) => {
      const p = parseRoom(room);
      const delay = (gi * 50 + ri * 40);
      html += `
        <div class="room-card" style="animation-delay:${delay}ms">
          <div class="room-name">${room}</div>
          <div class="room-floor">${typeof p.floor === 'number' ? `Floor ${p.floor}` : p.floor}${p.zone ? ` · Zone ${p.zone}` : ''} · Room ${p.no}</div>
          <div class="room-status"><span class="room-status-dot"></span>FREE</div>
        </div>`;
    });
    html += `</div></div>`;
  });

  output.innerHTML = html;
});
